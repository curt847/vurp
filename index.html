<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Playoff Moneyline Pool 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080b10;--surface:#0f1520;--surface2:#161f30;--surface3:#1a2438;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.14);
  --gold:#f0c040;--green:#22d47a;--red:#f05555;
  --text:#e8eef8;--text2:#9aa8c0;--text3:#5a6880;
  --east:#4a9eff;--west:#b06aff;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;font-size:17px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade-in{animation:fadeIn .3s ease both}

.header{background:var(--surface);border-bottom:1px solid var(--border2);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:100}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.06em;color:var(--gold)}
.header-logo span{color:var(--text)}
.header-right{display:flex;align-items:center;gap:10px}
.player-badge{background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:6px 16px;font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
.player-badge:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:8px;padding:6px 14px;font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:.15s}
.btn-sm:hover{border-color:var(--gold);color:var(--gold)}

.full-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card-box{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:40px 36px;width:100%;max-width:440px;text-align:center}
.card-box .logo{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--gold);letter-spacing:.06em;margin-bottom:4px}
.card-box .logo span{color:var(--text)}
.card-box .sub{font-size:15px;color:var(--text2);margin-bottom:28px}
.field{margin-bottom:16px;text-align:left}
.field label{display:block;font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;font-weight:600}
.field input,.field select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:12px 15px;font-family:'DM Sans',sans-serif;font-size:16px}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold)}
.field select option{background:#161f30}
.btn-primary{width:100%;background:var(--gold);color:#000;border:none;border-radius:8px;padding:13px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.06em;cursor:pointer;transition:opacity .15s;margin-top:8px}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{width:100%;background:none;border:1px solid var(--border2);color:var(--text2);border-radius:8px;padding:11px;font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;transition:.15s;margin-top:8px}
.btn-outline:hover{border-color:var(--text2);color:var(--text)}
.err-msg{color:var(--red);font-size:14px;margin-top:10px;min-height:20px}

.main{max-width:1160px;margin:0 auto;padding:28px 20px}

.banner{background:linear-gradient(135deg,#0d1520 0%,#141020 100%);border:1px solid rgba(240,192,64,.18);border-radius:var(--r);padding:22px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:28px}
.banner-val{font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--gold);line-height:1}
.banner-lbl{font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.banner-stats{display:flex;gap:32px;flex-wrap:wrap}

.section-hdr{display:flex;align-items:center;justify-content:space-between;margin:32px 0 16px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.06em;color:var(--text2)}
.conf-tag{font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.07em}
.tag-e{background:rgba(74,158,255,.12);color:var(--east);border:1px solid rgba(74,158,255,.25)}
.tag-w{background:rgba(176,106,255,.12);color:var(--west);border:1px solid rgba(176,106,255,.25)}

.lb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;margin-bottom:8px}
.lb-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;transition:border-color .2s;position:relative;overflow:hidden}
.lb-card:hover{border-color:var(--border2)}
.lb-card.is-me{border-color:rgba(240,192,64,.3)}
.lb-rank{position:absolute;top:14px;right:16px;font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--text3);line-height:1}
.lb-card.rank-1 .lb-rank{color:var(--gold)}
.lb-card.rank-2 .lb-rank{color:#c0c0c0}
.lb-card.rank-3 .lb-rank{color:#cd7f32}
.lb-name{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.04em;margin-bottom:10px;padding-right:44px}
.lb-winnings{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--green);line-height:1}
.lb-winnings.zero{color:var(--text3)}
.lb-sub{font-size:13px;color:var(--text2);margin-top:3px;margin-bottom:10px}
.lb-picks-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;border-top:1px solid var(--border);padding-top:10px}
.pick-chip{font-size:12px;font-weight:600;padding:4px 9px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);display:flex;align-items:center;gap:4px}
.pick-chip.won{background:var(--green);border-color:var(--green);color:#fff}
.pick-chip.lost{background:var(--red);border-color:var(--red);color:#fff;text-decoration:line-through}
.pick-chip.pending{background:rgba(240,192,64,.08);border-color:rgba(240,192,64,.2);color:var(--gold)}
.pick-chip .bonus{color:var(--gold);margin-left:2px}
.pick-chip.live-winning{background:transparent;border-color:rgba(34,212,122,.6);color:var(--green)}
.pick-chip.live-losing{background:transparent;border-color:rgba(240,85,85,.6);color:var(--red)}
.pick-chip.live-tied{background:transparent;border-color:rgba(255,255,255,.3);color:#fff}
.pick-chip.live-upcoming{background:transparent;border-color:var(--border);color:var(--text3)}
.lb-live-status{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;font-weight:700}
.lls-win{color:var(--green)}.lls-lose{color:var(--red)}.lls-tied{color:#fff}.lls-upcoming{color:var(--text3)}

.series-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:8px}
.series-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;transition:border-color .2s}
.series-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.series-card.status-pre::before{background:var(--text3)}
.series-card.status-live::before{background:var(--gold);animation:pulse 1.5s infinite}
.series-card.status-post::before{background:var(--green)}
.series-card.status-tbd::before{background:var(--text3);opacity:.3}
.series-round{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.matchup{display:flex;align-items:center;gap:12px}
.matchup-team{flex:1;text-align:center}
.team-seed{font-size:15px;font-weight:700;color:var(--text2);margin-bottom:4px}
.team-logo-wrap{height:48px;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.team-logo-wrap img{width:48px;height:48px;object-fit:contain}
.team-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.03em;line-height:1.1;color:#fff}
.team-odds{font-size:15px;font-weight:700;margin-top:4px}
.team-odds.fav{color:#ff7070}
.team-odds.dog{color:#3ddd88}
.team-odds.na{color:var(--text3);font-style:italic;font-size:12px}
.team-name.winner{color:var(--green)}
.team-name.loser{color:var(--text3);text-decoration:line-through}
.matchup-vs{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text3)}
.series-wins{font-size:42px;font-family:'Bebas Neue',sans-serif;color:#fff;text-align:center;margin-top:0;line-height:1;letter-spacing:.04em}
.series-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.series-badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:.06em}
.badge-pre{background:rgba(74,88,112,.2);color:var(--text3)}
.badge-live{background:rgba(240,192,64,.12);color:var(--gold)}
.badge-post{background:rgba(34,212,122,.1);color:var(--green)}
.badge-tbd{background:rgba(74,88,112,.1);color:var(--text3)}
.my-pick-label{font-size:13px;color:var(--text2);text-align:right;max-width:55%}
.my-pick-label strong{color:var(--gold)}
.result-won{color:var(--green);font-weight:700}
.result-lost{color:var(--red);font-weight:700}
.odds-warning{font-size:13px;color:var(--gold);background:rgba(240,192,64,.08);border:1px solid rgba(240,192,64,.2);border-radius:4px;padding:6px 10px;margin-top:8px;text-align:center}

.pick-panel{background:var(--surface);border:1px solid rgba(240,192,64,.25);border-radius:var(--r);padding:24px 26px;margin-bottom:28px}
.pick-panel-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.06em;color:var(--gold);margin-bottom:5px}
.pick-panel-sub{font-size:15px;color:var(--text2);margin-bottom:22px}
.pick-series-block{background:#111c2e;border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:18px;margin-bottom:14px}
.pick-series-title{font-size:15px;font-weight:700;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.pick-teams{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}

.pick-btn{flex:1;min-width:200px;background:#1a2438;border:2px solid rgba(255,255,255,.16);border-radius:10px;padding:14px 16px;cursor:pointer;transition:.15s;text-align:left;font-family:'DM Sans',sans-serif}
.pick-btn:hover:not(:disabled){border-color:var(--gold);background:#1e2d48}
.pick-btn.selected{background:rgba(240,192,64,.12);border-color:var(--gold)}
.pick-btn:disabled{opacity:.35;cursor:not-allowed}
.pick-btn-inner{display:flex;align-items:center;gap:14px}
.pick-btn-logo{width:52px;height:52px;object-fit:contain;flex-shrink:0}
.pick-btn-info{display:flex;flex-direction:column;gap:3px}
.pick-btn-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.03em;color:#fff;line-height:1.1;display:block}
.pick-btn-seed{font-size:13px;color:var(--text2)}
.pick-btn-odds{font-size:16px;font-weight:700;margin-top:3px}
.pick-btn-odds.fav{color:#ff7070}
.pick-btn-odds.dog{color:#3ddd88}
.pick-btn-odds.na{color:var(--text2)}
.pick-btn-payout{font-size:13px;color:var(--text2)}
.pick-btn-payout strong{color:#fff}

.games-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.games-label{font-size:15px;color:var(--text2);font-weight:600}
.games-btns{display:flex;gap:8px}
.game-btn{width:42px;height:42px;background:var(--surface);border:1px solid var(--border2);border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:17px;font-weight:700;color:var(--text2);transition:.15s}
.game-btn:hover{border-color:var(--gold);color:var(--gold)}
.game-btn.selected{background:rgba(240,192,64,.12);border-color:var(--gold);color:var(--gold)}
.submit-row{display:flex;justify-content:flex-end;margin-top:18px}
.btn-submit{background:var(--gold);color:#000;border:none;border-radius:8px;padding:12px 32px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.05em;cursor:pointer;transition:.15s}
.btn-submit:hover{opacity:.88}

.admin-panel{background:var(--surface);border:1px solid rgba(240,85,85,.2);border-radius:var(--r);padding:20px 24px;margin-bottom:28px}
.admin-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.06em;color:var(--red);margin-bottom:16px}
.admin-input{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:8px 13px;font-family:'DM Sans',sans-serif;font-size:14px}
.btn-sec{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);border-radius:7px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn-sec:hover{border-color:var(--text2);color:var(--text)}
.btn-danger{background:rgba(240,85,85,.1);border:1px solid rgba(240,85,85,.3);color:var(--red);border-radius:7px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn-danger:hover{background:rgba(240,85,85,.2)}
.admin-player-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.admin-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:30px;width:100%;max-width:420px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.05em;margin-bottom:18px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions button{flex:1}

.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:13px 20px;font-size:15px;font-weight:500;z-index:300;transform:translateY(80px);opacity:0;transition:all .3s;max-width:320px}
.toast.show{transform:none;opacity:1}
.toast.success{border-color:rgba(34,212,122,.35);color:var(--green)}
.toast.error{border-color:rgba(240,85,85,.35);color:var(--red)}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
.big-spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
.empty{text-align:center;padding:36px;color:var(--text3);font-size:15px}

@media(max-width:640px){
  .lb-grid,.series-grid{grid-template-columns:1fr}
  .banner{flex-direction:column;text-align:center}
  .banner-stats{justify-content:center}
  .card-box{padding:28px 20px}
  .pick-btn{min-width:100%}
  .pick-btn-logo{width:42px;height:42px}
  .pick-btn-name{font-size:22px}
}
</style>

<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
const CONFIG={
  PROXY_URL:'https://script.google.com/macros/s/AKfycbzO3naVBGuiLPY6rKXjT2cGvwMEpCekfJXDdEP8AAoAPiWQfKT9kvqnfX2Q2LKyoYkUPw/exec',
  ADMIN_PASSWORD:'commish2026',
  BUY_IN:20,
  REFRESH_INTERVAL:120000
};
let state={players:[],series:[],currentPlayer:null,currentPin:null,isAdmin:false,lastUpdated:null,loading:true};

// Seed is now carried on each team object from the script — no hardcoded lookup needed.
// Falls back to '?' for TBD slots.
function getSeed(abbrev, teamObj){ return (teamObj && teamObj.seed && teamObj.seed !== '?') ? teamObj.seed : '?'; }
let pendingPicks={};

function calcPayout(odds){if(!odds&&odds!==0)return null;return odds>0?odds:Math.round(10000/Math.abs(odds));}
function roundMultiplier(round){return {1:1, 2:1.1, 3:1.25, 4:1.5}[round]||1;}
function applyMultiplier(pts, round){return Math.round(pts * roundMultiplier(round));}
function calcWinnings(player){
  let total=0;
  (player.picks||[]).forEach(pk=>{
    const s=state.series.find(x=>x.id===pk.seriesId);
    if(!s||s.status!=='post'||!s.winner||s.winner!==pk.team)return;
    const odds=s.team1.name===pk.team?s.odds1:s.odds2;
    const pay=calcPayout(odds);if(!pay)return;
    const base=(pk.games&&s.games&&pk.games===s.games)?pay*2:pay;
    total+=applyMultiplier(base, s.round);
  });
  return total;
}

function apiCall(action,payload){
  return new Promise((resolve,reject)=>{
    const cbName='_cb_'+Date.now()+'_'+Math.floor(Math.random()*10000);
    let url=CONFIG.PROXY_URL+'?action='+encodeURIComponent(action)+'&callback='+cbName;
    if(payload)url+='&payload='+encodeURIComponent(JSON.stringify(payload));
    const timeout=setTimeout(()=>{cleanup();reject(new Error('Request timed out'));},15000);
    function cleanup(){clearTimeout(timeout);delete window[cbName];const el=document.getElementById(cbName);if(el)el.remove();}
    window[cbName]=function(json){cleanup();if(!json.success)reject(new Error(json.error||'API error'));else resolve(json.data);};
    const script=document.createElement('script');
    script.id=cbName;script.src=url;
    script.onerror=()=>{cleanup();reject(new Error('Network error'));};
    document.head.appendChild(script);
  });
}

async function init(){render();await loadState();render();setInterval(async()=>{await loadState();render();},CONFIG.REFRESH_INTERVAL);}
async function loadState(){
  try{
    const d=await apiCall('getState');
    // Preserve current player's locally-known picks in case API doesn't echo them back
    const prevPlayer=state.currentPlayer?state.players.find(p=>p.id===state.currentPlayer):null;
    const prevPicks=prevPlayer?.picks||[];
    state.players=d.players||[];
    // Deduplicate series: ESPN sometimes returns the same matchup twice with different IDs.
    // Keep the first occurrence of each unique team1+team2 pairing per conference+round.
    const rawSeries=d.series||[];
    const seen=new Set();
    state.series=rawSeries.filter(s=>{
      const key=[s.conf,s.round,
        [s.team1?.abbrev,s.team2?.abbrev].sort().join('_')
      ].join('|');
      if(seen.has(key))return false;
      seen.add(key);return true;
    });
    state.lastUpdated=d.lastUpdated||null;
    // If the API returned the current player with no picks but we had them locally, restore them
    if(state.currentPlayer&&prevPicks.length){
      const cp=state.players.find(p=>p.id===state.currentPlayer);
      if(cp&&(!cp.picks||!cp.picks.length))cp.picks=prevPicks;
    }
  }
  catch(e){showToast('Refresh failed: '+e.message,'error');}
  state.loading=false;
}
async function handleRefresh(){await loadState();render();showToast('Refreshed!','success');}
async function handleSyncScores(){
  const btn=document.getElementById('sync-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Syncing...';}
  try{
    await apiCall('syncScores',{});
    await loadState();
    render();
    showToast('Scores synced from ESPN!','success');
  }catch(e){
    showToast('Sync failed: '+e.message,'error');
    if(btn){btn.disabled=false;btn.textContent='Sync Scores';}
  }
}

async function handleLogin(){
  const sel=document.getElementById('login-select')?.value;
  const pin=document.getElementById('login-pin')?.value?.trim();
  const err=document.getElementById('login-error');
  if(!sel){err.textContent='Please select your name.';return;}
  const p=state.players.find(x=>x.id===sel);
  if(!p){err.textContent='Player not found.';return;}
  if(p.pin!==pin){err.textContent='Incorrect PIN.';return;}
  state.currentPlayer=sel;state.currentPin=pin;pendingPicks={};render();
}
async function handleNewPlayer(){
  const name=document.getElementById('new-player-name')?.value?.trim();
  const pin=document.getElementById('new-player-pin')?.value?.trim();
  const pin2=document.getElementById('new-player-pin2')?.value?.trim();
  const err=document.getElementById('login-error');
  if(!name){err.textContent='Please enter your name.';return;}
  if(!/^\d{4}$/.test(pin)){err.textContent='PIN must be exactly 4 digits.';return;}
  if(pin!==pin2){err.textContent='PINs do not match.';return;}
  if(state.players.find(x=>x.name.toLowerCase()===name.toLowerCase())){err.textContent='Name already taken.';return;}
  const btn=document.getElementById('join-btn');
  if(btn){btn.disabled=true;btn.textContent='Joining...';}
  try{
    const res=await apiCall('register',{name,pin});
    state.players.push({id:res.id,name:res.name,pin,picks:[]});
    state.currentPlayer=res.id;state.currentPin=pin;pendingPicks={};
    render();showToast('Welcome, '+name+'!','success');
  }catch(e){
    err.textContent=e.message;
    if(btn){btn.disabled=false;btn.textContent='Join Pool ->';}
  }
}
function handleLogout(){state.currentPlayer=null;state.currentPin=null;state.isAdmin=false;pendingPicks={};render();}
function showAdminLogin(){document.getElementById('admin-modal').style.display='flex';setTimeout(()=>document.getElementById('admin-pw-input')?.focus(),80);}
function closeModal(){document.getElementById('admin-modal').style.display='none';}
function handleAdminLogin(){
  if(document.getElementById('admin-pw-input')?.value===CONFIG.ADMIN_PASSWORD){
    state.isAdmin=true;closeModal();render();showToast('Commissioner mode active.','success');
  }else{document.getElementById('modal-error').textContent='Wrong password.';}
}

function togglePickTeam(sid,team){
  if(!pendingPicks[sid])pendingPicks[sid]={team:null,games:null};
  pendingPicks[sid].team=pendingPicks[sid].team===team?null:team;
  refreshPickPanel();
}
function togglePickGames(sid,g){
  if(!pendingPicks[sid])pendingPicks[sid]={team:null,games:null};
  pendingPicks[sid].games=pendingPicks[sid].games===g?null:g;
  refreshPickPanel();
}
async function submitAllPicks(){
  const player=state.players.find(p=>p.id===state.currentPlayer);if(!player)return;
  const toSubmit=Object.entries(pendingPicks)
    .filter(([,pk])=>pk.team)
    .filter(([sid])=>!(player.picks||[]).find(pk=>pk.seriesId===sid))
    .map(([sid,pk])=>({seriesId:sid,team:pk.team,games:pk.games}));
  if(!toSubmit.length){showToast('No new picks to submit.','error');return;}
  const btn=document.querySelector('.btn-submit');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Saving...';}
  try{
    await apiCall('submitPicks',{playerId:player.id,pin:state.currentPin,picks:toSubmit});
    if(!player.picks)player.picks=[];
    player.picks.push(...toSubmit);
    pendingPicks={};render();showToast(toSubmit.length+' pick(s) saved!','success');
  }catch(e){
    showToast('Error: '+e.message,'error');
    if(btn){btn.disabled=false;btn.textContent='Submit Picks ->';}
  }
}

async function adminSaveOdds(sid){
  const o1=parseInt(document.getElementById('ao1-'+sid)?.value);
  const o2=parseInt(document.getElementById('ao2-'+sid)?.value);
  if(isNaN(o1)||isNaN(o2)){showToast('Enter valid odds (e.g. -500 or +380).','error');return;}
  try{
    await apiCall('adminSetOdds',{adminPassword:CONFIG.ADMIN_PASSWORD,seriesId:sid,odds1:o1,odds2:o2});
    const s=state.series.find(x=>x.id===sid);if(s){s.odds1=o1;s.odds2=o2;}
    render();showToast('Odds saved!','success');
  }catch(e){showToast('Error: '+e.message,'error');}
}
async function adminAddPlayer(){
  const name=document.getElementById('admin-add-name')?.value?.trim();
  const pin=document.getElementById('admin-add-pin')?.value?.trim()||'0000';
  if(!name){showToast('Enter a name.','error');return;}
  try{
    const res=await apiCall('adminAddPlayer',{adminPassword:CONFIG.ADMIN_PASSWORD,name,pin});
    state.players.push({id:res.id,name:res.name,pin,picks:[]});
    document.getElementById('admin-add-name').value='';
    document.getElementById('admin-add-pin').value='';
    render();showToast(name+' added.','success');
  }catch(e){showToast('Error: '+e.message,'error');}
}
async function adminResetPin(pid){
  const player=state.players.find(p=>p.id===pid);
  const np=prompt('Reset PIN for '+player?.name+'. New 4-digit PIN:');
  if(!np||!/^\d{4}$/.test(np.trim())){showToast('Invalid PIN.','error');return;}
  try{
    await apiCall('adminResetPin',{adminPassword:CONFIG.ADMIN_PASSWORD,playerId:pid,newPin:np.trim()});
    player.pin=np.trim();showToast(player.name+"'s PIN reset.",'success');
  }catch(e){showToast('Error: '+e.message,'error');}
}
async function adminRemovePlayer(pid){
  const player=state.players.find(p=>p.id===pid);
  if(!confirm('Remove '+player?.name+' and all their picks?'))return;
  try{
    await apiCall('adminRemovePlayer',{adminPassword:CONFIG.ADMIN_PASSWORD,playerId:pid});
    state.players=state.players.filter(p=>p.id!==pid);
    if(state.currentPlayer===pid)state.currentPlayer=null;
    render();
  }catch(e){showToast('Error: '+e.message,'error');}
}

function getPlayerPick(player,sid){return(player?.picks||[]).find(pk=>pk.seriesId===sid)||null;}
function getStandings(){return state.players.map(p=>({...p,winnings:calcWinnings(p)})).sort((a,b)=>b.winnings-a.winnings);}
function oddsLabel(o){return(!o&&o!==0)?{label:'TBD',cls:'na'}:{label:(o>0?'+':'')+o,cls:o<0?'fav':'dog'};}
function safeName(n){return(n||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

function render(){
  const app=document.getElementById('app');
  if(state.loading){
    app.innerHTML='<div class="full-screen"><div style="text-align:center"><div style="font-family:Bebas Neue,sans-serif;font-size:40px;color:var(--gold);margin-bottom:18px">NBA <span style="color:var(--text)">Moneyline Pool</span></div><div class="big-spinner" style="margin:0 auto 14px"></div><div style="font-size:16px;color:var(--text3)">Connecting...</div></div></div>';
    return;
  }
  if(!state.currentPlayer){app.innerHTML=renderLogin();attachLoginEvents();return;}
  const player=state.players.find(p=>p.id===state.currentPlayer);
  const standings=getStandings();
  const ts=state.lastUpdated?new Date(state.lastUpdated).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
  app.innerHTML=`
    <div class="header">
      <div class="header-logo">NBA <span>Moneyline Pool</span> <span style="font-size:17px;color:var(--text3)">2026</span></div>
      <div class="header-right">
        ${ts?`<span style="font-size:13px;color:var(--text3)">${ts}</span>`:''}
        <button class="btn-sm" onclick="handleRefresh()">Refresh</button>
        ${state.isAdmin ? `<button class="btn-sm" id="sync-btn" onclick="handleSyncScores()" style="color:var(--gold);border-color:rgba(240,192,64,.4)">Sync Scores</button>` : ''}
        <span class="player-badge" onclick="handleLogout()">${player?.name||''} x</span>
        ${!state.isAdmin?`<button class="btn-sm" onclick="showAdminLogin()">Commish</button>`:`<button class="btn-sm" style="color:var(--red)" onclick="state.isAdmin=false;render()">Exit Admin</button>`}
      </div>
    </div>
    <div class="main fade-in">
      ${state.isAdmin?renderAdminPanel():''}
      ${renderBanner(standings)}
      ${renderPickPanel(player)}
      ${renderLeaderboard(standings)}
      ${renderSeriesSection('East')}
      ${renderSeriesSection('West')}
    </div>
    ${renderAdminModal()}`;
}

    <div class="logo">NBA <span>Moneyline Pool</span></div>
    <div class="sub">2026 Playoffs - Moneyline Pick'em</div>
    ${has?`
      <div class="field"><label>Your name</label><select id="login-select"><option value="">select</option>${state.players.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div>
      <div class="field"><label>4-digit PIN</label><input type="password" inputmode="numeric" maxlength="4" id="login-pin" placeholder="...."/></div>
      <button class="btn-primary" onclick="handleLogin()">Enter Pool</button>
      <button class="btn-outline" onclick="showNewPlayerForm()">New player? Join here</button>
    `:`
      <div class="field"><label>Your name</label><input type="text" id="new-player-name" placeholder="Enter your name" autofocus/></div>
      <div class="field"><label>4-digit PIN</label><input type="password" inputmode="numeric" maxlength="4" id="new-player-pin" placeholder="e.g. 1234"/></div>
      <div class="field"><label>Confirm PIN</label><input type="password" inputmode="numeric" maxlength="4" id="new-player-pin2" placeholder="Re-enter PIN"/></div>

    <div style="margin-top:16px;text-align:center"><button class="btn-sm" onclick="showAdminLogin()">Commissioner Login</button></div>

function showNewPlayerForm(){
  const b=document.getElementById('login-box');if(!b)return;
  b.innerHTML=`<div class="logo">NBA <span>Moneyline Pool</span></div><div class="sub">Create your account</div>
    <div class="field"><label>Your name</label><input type="text" id="new-player-name" placeholder="Enter your name" autofocus/></div>
    <div class="field"><label>4-digit PIN</label><input type="password" inputmode="numeric" maxlength="4" id="new-player-pin" placeholder="e.g. 1234"/></div>
    <div class="field"><label>Confirm PIN</label><input type="password" inputmode="numeric" maxlength="4" id="new-player-pin2" placeholder="Re-enter PIN"/></div>
    <button class="btn-primary" id="join-btn" onclick="handleNewPlayer()">Join Pool</button>
    <button class="btn-outline" onclick="render()">Back</button>

function attachLoginEvents(){document.getElementById('login-pin')?.addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();});}

function renderBanner(standings){
  const pot=state.players.length*CONFIG.BUY_IN;
  const leader=standings[0];
  const rounds=[...new Set(state.series.map(s=>s.round))].sort();
  const roundSummary=rounds.map(r=>{
    const rs=state.series.filter(s=>s.round===r);
    const done=rs.filter(s=>s.status==='post').length;
    const names={1:'R1',2:'R2',3:'CF',4:'Finals'};
    return`<div><div class="banner-val" style="font-size:28px">${done}/${rs.length}</div><div class="banner-lbl">${names[r]||'R'+r} Done</div></div>`;
  }).join('');
  return `<div class="banner">
    <div><div class="banner-lbl">Prize Pool</div><div class="banner-val">$${pot}</div></div>
    <div class="banner-stats">
      <div><div class="banner-val" style="font-size:32px">${state.players.length}</div><div class="banner-lbl">Players</div></div>
      ${roundSummary}
      ${leader?`<div><div class="banner-val" style="font-size:28px;color:var(--green)">${leader.winnings} pts</div><div class="banner-lbl">Leader - ${leader.name}</div></div>`:''}
    </div>
  </div>`;
}

function renderPickPanel(player){
  if(!player)return'';
  const unpicked=state.series.filter(s=>s.status==='pre'&&s.team1?.abbrev!=='TBD'&&s.team2?.abbrev!=='TBD'&&!getPlayerPick(player,s.id));
  if(!unpicked.length)return'';
  const hasAny=Object.values(pendingPicks).some(p=>p.team);
  return `<div class="pick-panel" id="pick-panel">
    <div class="pick-panel-title">Make Your Picks</div>
    <div class="pick-panel-sub">Pick the series winner. Correct game count = 2x payout! Picks lock when a series goes Live.<br><span style="color:var(--gold);font-size:13px">Round bonuses: R1 = 1x &nbsp;·&nbsp; R2 = 1.1x &nbsp;·&nbsp; Conf Finals = 1.25x &nbsp;·&nbsp; NBA Finals = 1.5x</span></div>
    ${unpicked.map(s=>renderPickBlock(player,s)).join('')}
    ${hasAny?`<div class="submit-row"><button class="btn-submit" onclick="submitAllPicks()">Submit Picks</button></div>`:''}
  </div>`;
}

function renderPickBlock(player,s){
  const pend=pendingPicks[s.id]||{};
  const o1=oddsLabel(s.odds1);const o2=oddsLabel(s.odds2);
  const p1=calcPayout(s.odds1);const p2=calcPayout(s.odds2);
  const mkBtn=(team,oLbl,payout)=>`
    <button class="pick-btn ${pend.team===team.name?'selected':''}" onclick="togglePickTeam('${s.id}','${safeName(team.name)}')">
      <div class="pick-btn-inner">
        ${team.logo?`<img src="${team.logo}" class="pick-btn-logo" onerror="this.style.display='none'">`:''}
        <div class="pick-btn-info">
          <span class="pick-btn-name">${team.name}</span>
          <span class="pick-btn-seed">#${team.seed||'?'} seed</span>
          <div class="pick-btn-odds ${oLbl.cls}">${oLbl.label}</div>
          ${payout!=null?`<div class="pick-btn-payout">Win: <strong>${applyMultiplier(payout, s.round)} pts</strong>${roundMultiplier(s.round)>1?' <span style="color:var(--gold);font-size:11px">('+roundMultiplier(s.round)+'x round bonus)</span>':''}</div>`:''}
        </div>
      </div>
    </button>`;
  return `<div class="pick-series-block">
    <div class="pick-series-title"><span>${s.conf} - ${s.roundName}</span><span style="font-size:13px;color:var(--text3)">$100 bet</span></div>
    ${!s.odds1?`<div class="odds-warning">Odds not yet entered by commissioner</div>`:''}
    <div class="pick-teams">${mkBtn(s.team1,o1,p1)}${mkBtn(s.team2,o2,p2)}</div>
    <div class="games-row">
      <span class="games-label">Games: <span style="color:var(--text2);font-size:13px;font-weight:400">(optional - correct = 2x payout)</span></span>
      <div class="games-btns">${[4,5,6,7].map(g=>`<button class="game-btn ${pend.games===g?'selected':''}" onclick="togglePickGames('${s.id}',${g})">${g}</button>`).join('')}</div>
    </div>
  </div>`;
}

function refreshPickPanel(){
  const panel=document.getElementById('pick-panel');if(!panel)return render();
  const player=state.players.find(p=>p.id===state.currentPlayer);
  const unpicked=state.series.filter(s=>s.status==='pre'&&s.team1?.abbrev!=='TBD'&&s.team2?.abbrev!=='TBD'&&!getPlayerPick(player,s.id));
  const hasAny=Object.values(pendingPicks).some(p=>p.team);
  panel.innerHTML=`<div class="pick-panel-title">Make Your Picks</div><div class="pick-panel-sub">Pick the series winner. Correct game count = 2x payout! Picks lock when a series goes Live.<br><span style="color:var(--gold);font-size:13px">Round bonuses: R1 = 1x &nbsp;·&nbsp; R2 = 1.1x &nbsp;·&nbsp; Conf Finals = 1.25x &nbsp;·&nbsp; NBA Finals = 1.5x</span></div>${unpicked.map(s=>renderPickBlock(player,s)).join('')}${hasAny?`<div class="submit-row"><button class="btn-submit" onclick="submitAllPicks()">Submit Picks</button></div>`:''}`;
}

function renderLeaderboard(standings){
  const myId=state.currentPlayer;
  return `<div class="section-hdr"><div class="section-title">Leaderboard</div></div>
  <div class="lb-grid">${standings.length?standings.map((p,i)=>{
    const isMe=p.id===myId;
    // Helper: get live status of a pick against current series record
    function getLivePickStatus(pk, s) {
      if (!s || s.status === 'post') return null; // handled separately
      if (s.status === 'pre') return 'upcoming';
      // series is live — compare wins
      const myTeamIsT1 = s.team1.name === pk.team;
      const myWins  = myTeamIsT1 ? (s.team1.wins||0) : (s.team2.wins||0);
      const oppWins = myTeamIsT1 ? (s.team2.wins||0) : (s.team1.wins||0);
      if (myWins > oppWins) return 'winning';
      if (myWins < oppWins) return 'losing';
      return 'tied';
    }
    const chips=(p.picks||[]).map(pk=>{
      const s=state.series.find(x=>x.id===pk.seriesId);if(!s)return'';
      const seriesLocked=s.status==='live'||s.status==='post';
      if(!isMe&&!state.isAdmin&&!seriesLocked){
        return'<span class="pick-chip live-upcoming" title="Picks hidden until series locks">🔒 Locked</span>';
      }
      const label=pk.team.split(' ').pop();
      const gLabel=pk.games?' ('+pk.games+'gms)':'';
      let cls='pending',bonus='';
      if(s.status==='post'&&s.winner){
        if(s.winner===pk.team){const odds=s.team1.name===pk.team?s.odds1:s.odds2;let pay=calcPayout(odds);if(pay){const dbl=pk.games&&s.games&&pk.games===s.games;if(dbl)pay*=2;pay=applyMultiplier(pay,s.round);const starBadge=pk.games&&s.games&&pk.games===s.games?' ⭐':'';cls='won';bonus=starBadge+' +'+pay+' pts';}}
        else{cls='lost';}
      } else if(s.status==='live') {
        const liveStatus=getLivePickStatus(pk,s);
        if(liveStatus==='winning') cls='live-winning';
        else if(liveStatus==='losing') cls='live-losing';
        else if(liveStatus==='tied') cls='live-tied';
        else cls='live-upcoming';
      } else {
        cls='live-upcoming'; // pre, not started
      }
      return'<span class="pick-chip '+cls+'">'+label+gLabel+bonus+'</span>';
    });
    // Deduplicate locked chips
    const lockedCount=chips.filter(c=>c.includes('🔒')).length;
    const visibleChips=chips.filter(c=>!c.includes('🔒'));
    const submittedBadge=lockedCount>0?`<span class="pick-chip live-upcoming" title="Picks hidden until series locks">🔒 ${lockedCount} pick${lockedCount>1?'s':''} submitted</span>`:'';
    const allChips=[submittedBadge,...visibleChips].filter(Boolean).join('');
    // Build live status summary (only for visible picks on live series)
    const livePicks=(p.picks||[]).filter(pk=>{const s=state.series.find(x=>x.id===pk.seriesId);return s&&s.status==='live';});
    const liveWin=livePicks.filter(pk=>getLivePickStatus(pk,state.series.find(x=>x.id===pk.seriesId))==='winning').length;
    const liveLose=livePicks.filter(pk=>getLivePickStatus(pk,state.series.find(x=>x.id===pk.seriesId))==='losing').length;
    const liveTied=livePicks.filter(pk=>getLivePickStatus(pk,state.series.find(x=>x.id===pk.seriesId))==='tied').length;
    const liveUpcoming=(p.picks||[]).filter(pk=>{const s=state.series.find(x=>x.id===pk.seriesId);return s&&s.status==='pre';}).length;
    const liveSummaryParts=[];
    if(liveWin>0) liveSummaryParts.push(`<span class="lls-win">▲ ${liveWin} Winning</span>`);
    if(liveLose>0) liveSummaryParts.push(`<span class="lls-lose">▼ ${liveLose} Losing</span>`);
    if(liveTied>0) liveSummaryParts.push(`<span class="lls-tied">${liveTied} Tied</span>`);
    if(liveUpcoming>0) liveSummaryParts.push(`<span class="lls-upcoming">${liveUpcoming} Upcoming</span>`);
    const liveSummary=liveSummaryParts.length?`<div class="lb-live-status">${liveSummaryParts.join(' <span style="color:var(--text3)">·</span> ')}</div>`:'';
    const settled=(p.picks||[]).filter(pk=>{const s=state.series.find(x=>x.id===pk.seriesId);return s&&s.status==='post';}).length;
    return`<div class="lb-card ${isMe?'is-me':''} rank-${i+1}">
      <div class="lb-rank">#${i+1}</div>
      <div class="lb-name">${p.name}</div>
      <div class="lb-winnings ${p.winnings===0?'zero':''}">${p.winnings} pts</div>
      <div class="lb-sub">${settled} settled</div>
      ${allChips?`<div class="lb-picks-row">${allChips}</div>`:''}
      ${liveSummary}
    </div>`;
  }).join(''):`<div class="empty">No players yet.</div>`}</div>`;
}

function renderSeriesSection(conf){
  const rounds=[...new Set(state.series.filter(s=>s.conf===conf&&!(s.team1?.abbrev==='TBD'&&s.team2?.abbrev==='TBD')).map(s=>s.round))].sort();
  const player=state.players.find(p=>p.id===state.currentPlayer);
  if(!rounds.length)return`<div class="section-hdr"><div class="section-title">${conf}ern Conference</div><span class="conf-tag tag-${conf==='East'?'e':'w'}">${conf}</span></div><div class="empty">Awaiting playoff data...</div>`;
  return`<div class="section-hdr"><div class="section-title">${conf}ern Conference</div><span class="conf-tag tag-${conf==='East'?'e':'w'}">${conf}</span></div>
  ${rounds.map(r=>{
    const rs=state.series.filter(s=>s.conf===conf&&s.round===r&&!(s.team1?.abbrev==='TBD'&&s.team2?.abbrev==='TBD'));
    const rName=rs[0]?.roundName||'Round '+r;
    return`<div style="margin-bottom:8px;font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-weight:700">${rName}</div>
    <div class="series-grid" style="margin-bottom:24px">${rs.map(s=>renderSeriesCard(s,player)).join('')}</div>`;
  }).join('')}`;
}

function renderSeriesCard(s,player){
  const myPick=player?getPlayerPick(player,s.id):null;
  const isTbd=s.team1?.abbrev==='TBD'||s.team2?.abbrev==='TBD';
  const eff=isTbd?'tbd':s.status;
  const t1w=s.winner&&s.winner===s.team1?.name;
  const t2w=s.winner&&s.winner===s.team2?.name;
  const o1=oddsLabel(s.odds1);const o2=oddsLabel(s.odds2);
  const badgeLabel={pre:'Upcoming',live:'Live — Picks 🔒',post:'Final',tbd:'TBD'};
  let myPickHtml='';
  if(myPick){
    const odds=s.team1?.name===myPick.team?s.odds1:s.odds2;
    const pay=calcPayout(odds);const gStr=myPick.games?' in '+myPick.games+'gms':'';
    if(s.status==='post'&&s.winner){
      if(s.winner===myPick.team){const dbl=myPick.games&&s.games&&myPick.games===s.games;let fp=pay?(dbl?pay*2:pay):'?';if(fp!=='?')fp=applyMultiplier(fp,s.round);const mx=roundMultiplier(s.round);myPickHtml=`<span class="my-pick-label">Your pick: <strong>${myPick.team.split(' ').pop()}${gStr}</strong><br><span class="result-won">+${fp} pts${dbl?' (2x!)':''}${mx>1?' ('+mx+'x)':''}</span></span>`;}
      else{myPickHtml=`<span class="my-pick-label">Your pick: <strong>${myPick.team.split(' ').pop()}${gStr}</strong><br><span class="result-lost">Lost</span></span>`;}
    }else{
      const mx=roundMultiplier(s.round);const mpay=pay?applyMultiplier(pay,s.round):null;const mpay2=pay?applyMultiplier(pay*2,s.round):null;myPickHtml=`<span class="my-pick-label">Your pick: <strong>${myPick.team.split(' ').pop()}${gStr}</strong>${mpay?`<br>Potential: ${mpay} pts${myPick.games?' ('+mpay2+' pts if '+myPick.games+'gms)':''}${mx>1?' · '+mx+'x':''}`:''}${!myPick.games&&mpay?'':''}`;
    }
  }
  const adminBlock=state.isAdmin?`<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(240,85,85,.15)">
    <div style="font-size:12px;color:var(--red);font-weight:700;margin-bottom:8px">COMMISSIONER ODDS</div>
    <div class="admin-row">
      <input class="admin-input" id="ao1-${s.id}" placeholder="${s.team1?.abbrev||'T1'} odds" value="${s.odds1||''}" style="width:105px">
      <input class="admin-input" id="ao2-${s.id}" placeholder="${s.team2?.abbrev||'T2'} odds" value="${s.odds2||''}" style="width:105px">
      <button class="btn-sec" onclick="adminSaveOdds('${s.id}')">Save</button>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-top:5px">Status, winner and games auto-detected from ESPN</div>
  </div>`:'';
  return`<div class="series-card status-${eff}">
    <div class="series-round">${s.roundName} - ${s.conf}</div>
    <div class="matchup">
      <div class="matchup-team">
        <div class="team-seed">#${getSeed(s.team1?.abbrev, s.team1)||'?'}</div>
        <div class="team-logo-wrap">${s.team1?.logo?`<img src="${s.team1.logo}" onerror="this.style.display='none'">`:'<div style="width:48px;height:48px"></div>'}</div>
        <div class="team-name ${t1w?'winner':s.winner&&!t1w?'loser':''}">${s.team1?.abbrev||'TBD'}</div>
        <div class="team-odds ${o1.cls}">${o1.label}</div>
      </div>
      <div style="text-align:center;min-width:52px">
        <div class="matchup-vs">VS</div>
        ${(s.team1?.wins||s.team2?.wins)&&s.status!=='pre'?`<div class="series-wins" style="margin-top:5px">${s.team1?.wins||0}-${s.team2?.wins||0}</div>`:''}
        ${s.status==='post'&&s.games?`<div class="series-wins">${s.games} games</div>`:''}
      </div>
      <div class="matchup-team">
        <div class="team-seed">#${getSeed(s.team2?.abbrev, s.team2)||'?'}</div>
        <div class="team-logo-wrap">${s.team2?.logo?`<img src="${s.team2.logo}" onerror="this.style.display='none'">`:'<div style="width:48px;height:48px"></div>'}</div>
        <div class="team-name ${t2w?'winner':s.winner&&!t2w?'loser':''}">${s.team2?.abbrev||'TBD'}</div>
        <div class="team-odds ${o2.cls}">${o2.label}</div>
      </div>
    </div>
    <div class="series-footer">
      <span class="series-badge badge-${eff}">${badgeLabel[eff]||eff}</span>
      ${myPickHtml}
    </div>
    ${!s.odds1&&!isTbd&&s.status!=='post'?`<div class="odds-warning">Awaiting odds from commissioner</div>`:''}
    ${adminBlock}
  </div>`;
}

async function adminDeletePick(playerId, seriesId){
  const player=state.players.find(p=>p.id===playerId);
  const series=state.series.find(s=>s.id===seriesId);
  const sName=series?series.team1.abbrev+' vs '+series.team2.abbrev:seriesId;
  if(!confirm('Delete '+player?.name+"'s pick for "+sName+'? They will be able to re-pick.'))return;
  try{
    await apiCall('adminDeletePick',{adminPassword:CONFIG.ADMIN_PASSWORD,playerId,seriesId});
    if(player&&player.picks)player.picks=player.picks.filter(pk=>pk.seriesId!==seriesId);
    render();showToast('Pick deleted - player can now re-pick.','success');
  }catch(e){showToast('Error: '+e.message,'error');}
}

function renderAdminPanel(){
  const playerRows=state.players.map(p=>{
    const picks=(p.picks||[]);
    const pickList=picks.length?picks.map(pk=>{
      const s=state.series.find(x=>x.id===pk.seriesId);
      const sName=s?s.team1.abbrev+' vs '+s.team2.abbrev:pk.seriesId;
      const gStr=pk.games?' in '+pk.games+'gms':'';
      return'<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);gap:8px">'+
        '<span style="font-size:13px;color:var(--text2)">'+sName+': <strong style="color:var(--text)">'+pk.team.split(' ').pop()+gStr+'</strong></span>'+
        '<button class="btn-danger" style="padding:4px 10px;font-size:12px" onclick="adminDeletePick(&quot;'+p.id+'&quot;,&quot;'+pk.seriesId+'&quot;)">Delete</button>'+
      '</div>';
    }).join(''):'<div style="font-size:13px;color:var(--text3);padding:4px 0">No picks yet</div>';
    return'<div class="admin-player-row" style="flex-direction:column;align-items:flex-start;gap:6px">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;width:100%">'+
        '<span style="font-weight:700;font-size:16px">'+p.name+'</span>'+
        '<div style="display:flex;gap:8px">'+
          '<button class="btn-sec" onclick="adminResetPin(&quot;'+p.id+'&quot;)">Reset PIN</button>'+
          '<button class="btn-danger" onclick="adminRemovePlayer(&quot;'+p.id+'&quot;)">Remove</button>'+
        '</div>'+
      '</div>'+
      (picks.length?'<div style="width:100%;padding-left:4px">'+pickList+'</div>':'')+
    '</div>';
  }).join('');

  return`<div class="admin-panel">
    <div class="admin-title">Commissioner Controls</div>
    <div class="admin-row">
      <input class="admin-input" id="admin-add-name" placeholder="New player name">
      <input class="admin-input" id="admin-add-pin" placeholder="PIN" maxlength="4" style="width:85px">
      <button class="btn-sec" onclick="adminAddPlayer()">Add Player</button>
    </div>
    <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--red);margin:16px 0 10px">Players &amp; Picks</div>
    ${playerRows||'<div class="empty" style="padding:14px">No players yet.</div>'}
    <div style="margin-top:18px;font-size:14px;color:var(--text2);background:var(--surface2);border-radius:8px;padding:14px;line-height:1.9">
      <strong style="color:var(--red)">Your only job:</strong> enter series moneyline odds on each series card below.<br>
      ESPN auto-detects: Live status (locks picks) - Winner - Game count - All rounds including Semis, Finals and NBA Finals<br>
      To fix a pick: hit Delete next to it above, then tell the player to re-pick.
    </div>
  </div>`;
}

function renderAdminModal(){
  return`<div class="modal-overlay" id="admin-modal" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-title">Commissioner Login</div>
      <div class="field"><label>Password</label><input type="password" id="admin-pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')handleAdminLogin()"/></div>
      <div class="err-msg" id="modal-error"></div>
      <div class="modal-actions">
        <button class="btn-outline" style="margin:0" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" style="padding:11px;margin:0" onclick="handleAdminLogin()">Login</button>
      </div>
    </div>
  </div>`;
}

function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.className='toast',3200);}

init();
</script>
</body>
</html>
